<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-bar">
        <div>
          <h1>Mergington High School</h1>
          <h2>Extracurricular Activities</h2>
        </div>
        <button id="user-menu-button" class="icon-button" type="button" aria-label="Teacher account">
          <span aria-hidden="true">👤</span>
        </button>
      </div>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Teacher Controls</h3>
        <p id="admin-status" class="info-panel">
          Teacher login is required to register or unregister students.
        </p>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <div id="auth-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="auth-title">Teacher Account</h3>
          <button id="close-auth-modal" class="icon-button" type="button" aria-label="Close login window">✕</button>
        </div>
        <div id="auth-panel-logged-out">
          <p class="modal-copy">Log in to manage registrations.</p>
          <button id="open-login-form" type="button">Login</button>
          <form id="login-form" class="hidden auth-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" id="username" autocomplete="username" />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input type="password" id="password" autocomplete="current-password" />
            </div>
            <button type="submit">Sign In</button>
          </form>
        </div>
        <div id="auth-panel-logged-in" class="hidden">
          <p id="logged-in-user" class="modal-copy"></p>
          <button id="logout-button" type="button">Log Out</button>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
